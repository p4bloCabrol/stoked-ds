name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level=high

      - name: Lint
        run: pnpm run lint

      - name: Type check
        run: pnpm run typecheck

      - name: Unit tests (root)
        run: pnpm run test

      - name: Unit tests (mcp-server)
        run: pnpm --filter @stoked-ds/mcp-server test

      - name: Build (root)
        run: pnpm run build

      - name: Build (mcp-server)
        run: pnpm --filter @stoked-ds/mcp-server build

      - name: Validate package contents
        run: pnpm pack --dry-run
